<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="mesh-background">
        <div class="mesh-blob mesh-blob-1"></div>
        <div class="mesh-blob mesh-blob-2"></div>
        <div class="mesh-blob mesh-blob-3"></div>
    </div>

    <div class="container">
        <header class="app-header">
            <div class="logo-container">
                <i class="fa-solid fa-layer-group logo-icon"></i>
            </div>
            <h1>Agentic Document Generator</h1>
            <p>Powered by AI Writer & Critic Agents</p>
        </header>

        <main>
            <div class="card glass input-section fade-in">
                <form id="generate-form">
                    <div class="form-row">
                        <div class="form-group half-width">
                            <label for="topic"><i class="fa-solid fa-bolt"></i> Topic</label>
                            <input type="text" id="topic" placeholder="e.g. Next-Gen Mobile App for Food Delivery"
                                required>
                        </div>
                        <div class="form-group half-width">
                            <label for="max_attempts"><i class="fa-solid fa-rotate-right"></i> Max Review
                                Attempts</label>
                            <input type="number" id="max_attempts" value="3" min="1" max="5">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes"><i class="fa-solid fa-pen-nib"></i> Rough Notes / Instructions</label>
                        <textarea id="notes" rows="5"
                            placeholder="Enter your key points... We will completely humanize the output."
                            required></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="glow-btn">
                        <span class="btn-text">Generate Stunning Document</span>
                        <div class="loader hidden"></div>
                    </button>
                </form>
            </div>

            <div id="results" class="hidden">
                <div class="section-title fade-in">
                    <h2><i class="fa-solid fa-microchip"></i> Generation Process</h2>
                    <div class="divider"></div>
                </div>
                <div id="attempts-container" class="fade-in"></div>

                <div class="section-title fade-in mt-4">
                    <h2><i class="fa-solid fa-file-signature"></i> Final Output Editor</h2>
                    <div class="divider"></div>
                </div>

                <div class="document-workspace fade-in">
                    <div class="workspace-toolbar">
                        <div class="tabs">
                            <button class="tab-btn active" id="tab-preview"><i class="fa-solid fa-eye"></i>
                                Preview</button>
                            <button class="tab-btn" id="tab-edit"><i class="fa-solid fa-code"></i> Edit
                                Markdown</button>
                        </div>
                        <div class="actions">
                            <button class="action-btn" id="download-pdf-btn" title="Download PDF"><i
                                    class="fa-solid fa-file-pdf"></i> .pdf</button>
                            <button class="action-btn" id="download-md-btn" title="Download Markdown"><i
                                    class="fa-solid fa-file-arrow-down"></i> .md</button>
                            <button class="action-btn" id="download-txt-btn" title="Download Text"><i
                                    class="fa-solid fa-file-lines"></i> .txt</button>
                        </div>
                    </div>

                    <div class="workspace-content">
                        <div id="final-document" class="markdown-preview active-view"></div>
                        <textarea id="markdown-editor" class="markdown-editor-textarea" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}?v={{ range(1, 100000) | random }}"></script>
</body>

</html>
